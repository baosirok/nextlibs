name: Build nextlib

on:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build nextlib
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ⭐ 关键：安装 NASM
      - name: Install NASM
        uses: ilammy/setup-nasm@v1

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y yasm pkg-config

      - name: Set Up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ⭐ 关键：显式安装 NDK
      - name: Install Android NDK and CMake
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager --install "ndk;27.0.12077973" "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build FFmpeg libraries
        run: |
          cd ffmpeg
          chmod +x setup.sh
          ./setup.sh
        env:
          ANDROID_SDK_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          ANDROID_CMAKE_VERSION: 3.22.1

      - name: Build Project
        run: ./gradlew :media3ext:assembleRelease --stacktrace

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: nextlib-release
          path: ./media3ext/build/outputs/aar/media3ext-release.aar
