name: Build nextlib

on:
  workflow_dispatch:


concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build nextlib
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y yasm pkg-config

      - name: Set Up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Project
        run: ./gradlew :media3ext:assembleRelease

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: nextlib-release
          path: ./media3ext/build/outputs/aar/media3ext-release.aar
