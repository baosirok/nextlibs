name: Build nextlib

on:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build nextlib
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ⭐ 使用专门的 nasm action（更可靠）
      - name: Setup NASM
        uses: ilammy/setup-nasm@v1

      # ⭐ 或者用传统方式（添加验证）
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y yasm pkg-config git curl
          
          # 验证安装
          echo "========================================="
          echo "Build tools installed:"
          nasm --version || echo "WARNING: nasm not found via apt"
          yasm --version
          pkg-config --version
          echo "PATH: $PATH"
          echo "========================================="

      - name: Set Up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and CMake
        run: |
          echo "Installing NDK 27.0.12077973 and CMake 3.22.1..."
          yes | sdkmanager --licenses || true
          sdkmanager --install "ndk;27.0.12077973" "cmake;3.22.1"
          
          NDK_PATH="$ANDROID_HOME/ndk/27.0.12077973"
          
          if [[ ! -d "$NDK_PATH" ]]; then
            echo "ERROR: NDK not found at $NDK_PATH"
            echo "Available NDKs:"
            ls -la "$ANDROID_HOME/ndk/" || echo "No NDK directory"
            exit 1
          fi
          
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "✓ NDK installed at $NDK_PATH"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify build environment
        run: |
          echo "========================================="
          echo "Build environment verification"
          echo "========================================="
          echo "nasm: $(which nasm || echo 'NOT FOUND')"
          echo "nasm version: $(nasm --version 2>&1 || echo 'FAILED')"
          echo "yasm: $(which yasm || echo 'NOT FOUND')"
          echo "NDK: $ANDROID_NDK_HOME"
          echo "SDK: $ANDROID_HOME"
          echo "========================================="
          
          # 如果 nasm 还是找不到，直接失败
          if ! command -v nasm &> /dev/null; then
            echo "ERROR: nasm is required but not found!"
            exit 1
          fi

      - name: Build FFmpeg libraries
        run: |
          cd ffmpeg
          chmod +x setup.sh
          ./setup.sh
        env:
          ANDROID_SDK_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          ANDROID_CMAKE_VERSION: 3.22.1

      - name: Build Project
        run: ./gradlew :media3ext:assembleRelease --stacktrace

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: nextlib-release
          path: ./media3ext/build/outputs/aar/media3ext-release.aar

      - name: Upload FFmpeg libraries
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-libs
          path: ffmpeg/output/lib/**/*.so
